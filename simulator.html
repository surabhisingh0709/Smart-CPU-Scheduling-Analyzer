<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smart CPU Scheduler | Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0A0F1A, #03060C);
            color: #EFF3FC;
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #10141f;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #5A7CFF;
            border-radius: 10px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 3rem;
            backdrop-filter: blur(12px);
            background: rgba(5, 10, 20, 0.75);
            border-bottom: 1px solid rgba(72, 120, 255, 0.25);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #A0C0FF, #6C8CFF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        .logo i {
            background: none;
            color: #6C8CFF;
            margin-right: 6px;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: #CFE3FF;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
            font-size: 0.95rem;
        }
        .nav-links a:hover, .nav-links a.active {
            color: white;
            text-shadow: 0 0 6px #6C8CFF;
        }

        .simulator-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
            overflow-x: hidden;
        }

        .two-columns {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 2rem;
        }

        .input-panel {
            background: rgba(12, 20, 32, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            border: 1px solid rgba(92, 124, 255, 0.2);
            padding: 1.5rem;
            height: fit-content;
        }

        .panel-title {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #A0C0FF;
        }

        .algo-selector {
            background: #0E1625;
            border: 1px solid #2A3650;
            border-radius: 0.8rem;
            padding: 0.7rem;
            width: 100%;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            cursor: pointer;
        }

        .process-list {
            margin: 1rem 0;
            max-height: 300px;
            overflow-y: auto;
        }
        .process-card {
            background: #0E1625;
            border: 1px solid #2A3650;
            border-radius: 0.7rem;
            padding: 0.6rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .process-card:hover {
            border-color: #5A7CFF;
        }
        .process-info {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .process-info span {
            font-size: 0.7rem;
            color: #B8CCF0;
        }
        .process-info strong {
            font-size: 0.8rem;
            color: #6C8CFF;
        }
        .delete-process {
            background: none;
            border: none;
            color: #FF6B6B;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .add-process-form {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin: 1rem 0;
        }
        .form-row {
            display: flex;
            gap: 0.6rem;
        }
        .form-input {
            flex: 1;
            min-width: 0;
            background: #0E1625;
            border: 1px solid #2A3650;
            border-radius: 0.6rem;
            padding: 0.6rem;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
        }
        .form-input:focus {
            outline: none;
            border-color: #5A7CFF;
        }

        .btn-primary {
            background: linear-gradient(95deg, #5C7CFF, #3F5FDF);
            border: none;
            padding: 0.7rem;
            border-radius: 0.7rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 0.5rem;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .btn-secondary {
            background: rgba(92, 124, 255, 0.15);
            border: 1px solid #5A7CFF;
            padding: 0.5rem;
            border-radius: 0.6rem;
            color: #A0C0FF;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.75rem;
            flex: 1;
            text-align: center;
        }
        .btn-group {
            display: flex;
            gap: 0.6rem;
            margin: 0.6rem 0;
        }

        .output-panel {
            background: rgba(12, 20, 32, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            border: 1px solid rgba(92, 124, 255, 0.2);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .gantt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .algorithm-badge {
            background: rgba(92, 124, 255, 0.2);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #6C8CFF;
        }
        
        .gantt-wrapper {
            background: #0A0F1A;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            overflow-x: auto;
            overflow-y: visible;
        }
        
        .gantt-wrapper::-webkit-scrollbar {
            height: 6px;
        }
        .gantt-wrapper::-webkit-scrollbar-track {
            background: #1a1f2e;
            border-radius: 10px;
        }
        .gantt-wrapper::-webkit-scrollbar-thumb {
            background: #5A7CFF;
            border-radius: 10px;
        }
        
        .placeholder {
            text-align: center;
            color: #6A7DA0;
            padding: 2rem;
            font-size: 0.9rem;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        .metric-card {
            background: #0E1625;
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            border: 1px solid #2A3650;
        }
        .metric-card:hover {
            border-color: #5A7CFF;
        }
        .metric-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #6C8CFF;
        }
        .metric-label {
            font-size: 0.7rem;
            color: #A7BBE0;
            margin-top: 0.2rem;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .loading-spinner {
            background: #0E1625;
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            border: 1px solid #5A7CFF;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2A3650;
            border-top-color: #5A7CFF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 1000px) {
            .two-columns { grid-template-columns: 1fr; }
            .navbar { padding: 1rem; flex-wrap: wrap; }
            .nav-links { gap: 1rem; flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="window.location.href='index2.html'">
            <i class="fas fa-microchip"></i> SmartCPU
        </div>
        <div class="nav-links" id="navLinks">
            <a href="index2.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="simulator.html" class="active">Simulator</a>
            <a href="comparison.html">Comparison</a>
            <a href="advanced.html">Advanced</a>
            <span id="authSection"></span>
        </div>
    </nav>

    <div class="simulator-container">
        <div class="two-columns">
            <div class="input-panel">
                <h3 class="panel-title"><i class="fas fa-microchip"></i> CPU Scheduling Simulator</h3>
                
                <select id="algorithmSelect" class="algo-selector">
                    <option value="FCFS">FCFS (First Come First Serve)</option>
                    <option value="SJF">SJF (Shortest Job First)</option>
                    <option value="SRTF">SRTF (Shortest Remaining Time First)</option>
                    <option value="RR">Round Robin</option>
                    <option value="PRIORITY">Priority (Non-Preemptive)</option>
                    <option value="MLFQ">MLFQ (Multi-Level Feedback Queue)</option>
                </select>

                <div id="quantumGroup" style="display: none;">
                    <input type="number" id="quantumInput" class="form-input" placeholder="Time Quantum" value="2" style="margin-bottom: 0.5rem;">
                </div>

                <h4 style="margin: 0.5rem 0 0.5rem; font-size: 0.85rem;"><i class="fas fa-list"></i> Process Queue</h4>
                <div id="processList" class="process-list"></div>

                <div class="add-process-form">
                    <div class="form-row">
                        <input type="text" id="pidInput" class="form-input" placeholder="PID (e.g., P1)">
                        <input type="number" id="arrivalInput" class="form-input" placeholder="Arrival Time">
                    </div>
                    <div class="form-row">
                        <input type="number" id="burstInput" class="form-input" placeholder="Burst Time">
                        <input type="number" id="priorityInput" class="form-input" placeholder="Priority">
                    </div>
                </div>

                <div class="btn-group">
                    <button class="btn-secondary" id="addProcessBtn"><i class="fas fa-plus"></i> Add Process</button>
                    <button class="btn-secondary" id="randomGenerateBtn"><i class="fas fa-dice"></i> Random Generate</button>
                </div>

                <button class="btn-primary" id="runSimulationBtn"><i class="fas fa-play"></i> Run Simulation</button>
            </div>

            <div class="output-panel">
                <div class="gantt-header">
                    <h3 class="panel-title" style="margin-bottom: 0; font-size: 1rem;"><i class="fas fa-chart-gantt"></i> Gantt Chart</h3>
                    <span class="algorithm-badge" id="currentAlgoBadge">FCFS</span>
                </div>
                
                <div class="gantt-wrapper" id="ganttWrapper">
                    <div id="ganttContainer">
                        <div class="placeholder"><i class="fas fa-chart-gantt"></i> Run simulation to see Gantt chart</div>
                    </div>
                </div>

                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-value" id="avgWaitingTime">—</div>
                        <div class="metric-label">Average Waiting Time</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="avgTurnaroundTime">—</div>
                        <div class="metric-label">Average Turnaround Time</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" style="display: none;" class="loading-overlay">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>Connecting to backend...</p>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:5000/run';

        const processColors = {
            'P1': '#FF6B6B', 'P2': '#4ECDC4', 'P3': '#45B7D1', 'P4': '#96CEB4',
            'P5': '#FFEAA7', 'P6': '#DDA0DD', 'P7': '#98D8C8', 'P8': '#F7B787'
        };
        
        const fallbackColors = ['#5A7CFF', '#6C8CFF', '#7D9EFF', '#8EAEFF'];

        function getProcessColor(pid) {
            if (processColors[pid]) return processColors[pid];
            const match = pid.match(/\d+/);
            if (match) return fallbackColors[(parseInt(match[0]) - 1) % fallbackColors.length];
            return fallbackColors[0];
        }

        function getUserData() {
            const usersDB = localStorage.getItem('cpu_sim_users_db');
            if (usersDB) {
                const users = JSON.parse(usersDB);
                const loggedInEmail = sessionStorage.getItem('loggedUserEmail');
                if (loggedInEmail && users[loggedInEmail]) {
                    return users[loggedInEmail];
                }
            }
            return null;
        }

        function getUserFullName() {
            const userData = getUserData();
            if (userData) {
                if (userData.firstName && userData.lastName) {
                    return `${userData.firstName} ${userData.lastName}`;
                }
                if (userData.name) {
                    return userData.name;
                }
            }
            return sessionStorage.getItem('loggedUserName') || 'User';
        }

        function updateNavbarWithLogout() {
            const loggedIn = sessionStorage.getItem('cpu_sim_loggedIn') === 'true';
            const authSection = document.getElementById('authSection');
            
            if (loggedIn) {
                const fullName = getUserFullName();
                const firstName = fullName.split(' ')[0];
                authSection.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <span style="color: #6C8CFF;"><i class="fas fa-user-circle"></i> ${firstName}</span>
                        <button onclick="logoutUser()" style="background: rgba(255,107,107,0.15); border: 1px solid #FF6B6B; padding: 0.3rem 0.8rem; border-radius: 40px; color: #FF6B6B; cursor: pointer; font-size: 0.75rem;">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </button>
                    </div>
                `;
            } else {
                authSection.innerHTML = `<a href="login.html" style="color: #CFE3FF; text-decoration: none;">Login</a>`;
            }
        }

        function logoutUser() {
            sessionStorage.removeItem('cpu_sim_loggedIn');
            sessionStorage.removeItem('loggedUserEmail');
            sessionStorage.removeItem('loggedUserName');
            sessionStorage.removeItem('tempLoginEmail');
            sessionStorage.removeItem('tempUserData');
            alert('✅ Logged out successfully!');
            window.location.href = 'index.html';
        }

        // Convert frontend processes to backend format
        let processes = [
            { pid: 1, arrival: 0, burst: 5, priority: 2 },
            { pid: 2, arrival: 1, burst: 3, priority: 1 },
            { pid: 3, arrival: 2, burst: 8, priority: 3 },
            { pid: 4, arrival: 3, burst: 6, priority: 2 }
        ];

        function renderProcessList() {
            const container = document.getElementById('processList');
            container.innerHTML = '';
            processes.forEach((p, index) => {
                const pidStr = `P${p.pid}`;
                const color = getProcessColor(pidStr);
                const card = document.createElement('div');
                card.className = 'process-card';
                card.style.borderLeft = `3px solid ${color}`;
                card.innerHTML = `
                    <div class="process-info">
                        <span><strong style="color: ${color};">P${p.pid}</strong></span>
                        <span>AT:${p.arrival}</span>
                        <span>BT:${p.burst}</span>
                        <span>P:${p.priority}</span>
                    </div>
                    <button class="delete-process" data-index="${index}"><i class="fas fa-trash"></i></button>
                `;
                container.appendChild(card);
            });
            document.querySelectorAll('.delete-process').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.dataset.index);
                    processes.splice(idx, 1);
                    processes.forEach((p, i) => { p.pid = i + 1; });
                    renderProcessList();
                });
            });
        }

        function addProcess() {
            const pidInput = document.getElementById('pidInput').value.trim();
            const arrival = parseInt(document.getElementById('arrivalInput').value);
            const burst = parseInt(document.getElementById('burstInput').value);
            const priority = parseInt(document.getElementById('priorityInput').value) || 1;
            
            if (isNaN(arrival) || isNaN(burst)) {
                alert('Please fill Arrival Time and Burst Time');
                return;
            }
            
            const newPid = processes.length + 1;
            processes.push({ pid: newPid, arrival, burst, priority });
            renderProcessList();
            
            document.getElementById('pidInput').value = '';
            document.getElementById('arrivalInput').value = '';
            document.getElementById('burstInput').value = '';
            document.getElementById('priorityInput').value = '';
        }

        function randomGenerate() {
            processes = [];
            for (let i = 1; i <= 4; i++) {
                processes.push({
                    pid: i,
                    arrival: Math.floor(Math.random() * 5),
                    burst: Math.floor(Math.random() * 8) + 2,
                    priority: Math.floor(Math.random() * 5) + 1
                });
            }
            renderProcessList();
        }

        function showLoading() {
            document.getElementById('loadingOverlay').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // FIXED: Properly aligned Gantt chart rendering
        function renderGanttChartFromAPI(ganttData, metrics, algorithm) {
            const container = document.getElementById('ganttContainer');
            
            if (!ganttData || ganttData.length === 0) {
                container.innerHTML = '<div class="placeholder"><i class="fas fa-chart-gantt"></i> No Gantt chart data received</div>';
                return;
            }
            
            const maxTime = Math.max(...ganttData.map(b => b.end), 1);
            const unitWidth = 60;
            const chartWidth = maxTime * unitWidth;
            
            // ✅ FIXED TIMELINE - Perfect alignment with blocks
            let timelineHTML = `<div style="position: relative; width: ${chartWidth}px; height: 25px; margin-bottom: 10px;">`;
            for (let i = 0; i <= maxTime; i++) {
                timelineHTML += `
                    <div style="position: absolute; left: ${i * unitWidth}px; transform: translateX(-50%); font-size: 0.7rem; color: #8FA3D9;">
                        ${i}
                    </div>
                    <div style="position: absolute; left: ${i * unitWidth}px; top: 18px; width: 1px; height: 8px; background: rgba(92,124,255,0.3);"></div>
                `;
            }
            timelineHTML += `</div>`;
            
            // ✅ BLOCKS - Positioned absolutely at exact start time
            let blocksHTML = `<div style="position: relative; width: ${chartWidth}px; height: 55px; margin: 5px 0;">`;
            for (let block of ganttData) {
                const leftPos = block.start * unitWidth;
                const blockWidth = (block.end - block.start) * unitWidth;
                const color = getProcessColor(block.pid);
                blocksHTML += `
                    <div style="position: absolute; left: ${leftPos}px; width: ${blockWidth}px; height: 100%; background: linear-gradient(135deg, ${color}, ${color}cc); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; color: white; cursor: pointer; transition: all 0.2s;"
                        title="${block.pid}: ${block.start} → ${block.end} (Duration: ${block.end - block.start})">
                        ${block.pid}
                    </div>
                `;
            }
            blocksHTML += `</div>`;
            
            // ✅ LABELS - Centered below each block
            let labelsHTML = `<div style="position: relative; width: ${chartWidth}px; height: 25px; margin-top: 5px;">`;
            for (let block of ganttData) {
                const centerPos = ((block.start + block.end) / 2) * unitWidth;
                const color = getProcessColor(block.pid);
                labelsHTML += `
                    <div style="position: absolute; left: ${centerPos}px; transform: translateX(-50%); font-size: 0.7rem; font-weight: 600; color: ${color};">
                        ${block.pid}
                    </div>
                `;
            }
            labelsHTML += `</div>`;
            
            container.innerHTML = `
                <div style="min-width: ${chartWidth}px;">
                    ${timelineHTML}
                    ${blocksHTML}
                    ${labelsHTML}
                </div>
            `;
            
            if (metrics) {
                document.getElementById('avgWaitingTime').innerText = metrics.avg_waiting?.toFixed(2) || '—';
                document.getElementById('avgTurnaroundTime').innerText = metrics.avg_turnaround?.toFixed(2) || '—';
            }
            
            document.getElementById('currentAlgoBadge').innerText = algorithm;
        }

        async function runSimulation() {
            if (processes.length === 0) {
                alert('Please add at least one process');
                return;
            }
            
            const algorithm = document.getElementById('algorithmSelect').value;
            const quantum = parseInt(document.getElementById('quantumInput').value) || 2;
            
            const requestBody = {
                processes: processes.map(p => ({
                    pid: p.pid,
                    arrival: p.arrival,
                    burst: p.burst,
                    priority: p.priority
                })),
                algorithm: algorithm,
                quantum: quantum
            };
            
            console.log('Sending to backend:', JSON.stringify(requestBody, null, 2));
            showLoading();
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Backend response:', data);
                
                if (data.gantt && data.metrics) {
                    renderGanttChartFromAPI(data.gantt, data.metrics, algorithm);
                } else {
                    throw new Error('Invalid response format');
                }
                
            } catch (error) {
                console.error('Error:', error);
                alert(`Failed to connect to backend!\n\nMake sure your Flask server is running at ${API_URL}\n\nError: ${error.message}`);
                
                document.getElementById('ganttContainer').innerHTML = `
                    <div class="placeholder">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Backend not reachable at ${API_URL}</p>
                        <p style="font-size: 0.7rem; margin-top: 0.5rem;">Please start your Flask server: python app.py</p>
                    </div>
                `;
            } finally {
                hideLoading();
            }
        }

        document.getElementById('addProcessBtn').addEventListener('click', addProcess);
        document.getElementById('randomGenerateBtn').addEventListener('click', randomGenerate);
        document.getElementById('runSimulationBtn').addEventListener('click', runSimulation);
        
        document.getElementById('algorithmSelect').addEventListener('change', (e) => {
            const quantumGroup = document.getElementById('quantumGroup');
            quantumGroup.style.display = e.target.value === 'RR' ? 'block' : 'none';
        });
        
        renderProcessList();
        updateNavbarWithLogout();
    </script>
</body>
</html>
